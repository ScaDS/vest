<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Embeddings - 3D Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #ffffff;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        /* Left-side panel container */
        #left-panels {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .left-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            width: 350px;
        }

        #ui-panel {
            padding: 20px;
        }

        .left-panel h2,
        .left-panel h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }

        .info-group {
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-label {
            color: #aaa;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .info-value {
            color: #4a9eff;
            font-family: 'Courier New', monospace;
        }

        #controls {
            font-size: 12px;
            line-height: 1.8;
        }

        #controls h3 {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .control-section {
            margin-bottom: 10px;
        }

        .control-key {
            color: #ffd700;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            z-index: 150;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #4a9eff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Right-side mini views */
        #side-views {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 110;
        }

        .side-view {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px;
            width: 240px;
        }

        .side-title {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .side-view canvas {
            display: block;
            width: 224px; /* 240 - padding*2 */
            height: 140px;
            background: #0f0f0f;
            border-radius: 4px;
        }

        /* Keyframes Panel Styles */
        #keyframes-panel {
            max-height: 400px;
        }

        #keyframes-panel h3 {
            margin-bottom: 10px;
            font-size: 14px;
        }

        #keyframes-list {
            margin-bottom: 10px;
            min-height: 40px;
            max-height: 200px;
            overflow-y: auto;
            background: #0f0f0f;
            border-radius: 4px;
            padding: 5px;
        }

        .keyframe-item {
            background: rgba(74, 158, 255, 0.1);
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 4px;
            padding: 6px 8px;
            margin-bottom: 4px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .keyframe-item:hover {
            background: rgba(74, 158, 255, 0.2);
        }

        .keyframe-item-info {
            flex: 1;
            font-family: 'Courier New', monospace;
            color: #4a9eff;
        }

        .keyframe-item-buttons {
            display: flex;
            gap: 4px;
        }

        .keyframe-item-goto {
            background: rgba(74, 158, 255, 0.3);
            border: 1px solid rgba(74, 158, 255, 0.5);
            color: #4a9eff;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            transition: background 0.2s;
        }

        .keyframe-item-goto:hover {
            background: rgba(74, 158, 255, 0.5);
        }

        .keyframe-item-delete {
            background: rgba(255, 80, 80, 0.3);
            border: 1px solid rgba(255, 80, 80, 0.5);
            color: #ff5050;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            transition: background 0.2s;
        }

        .keyframe-item-delete:hover {
            background: rgba(255, 80, 80, 0.5);
        }

        .keyframe-controls {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .keyframe-btn {
            flex: 1;
            background: rgba(74, 158, 255, 0.2);
            border: 1px solid rgba(74, 158, 255, 0.5);
            color: #4a9eff;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .keyframe-btn:hover {
            background: rgba(74, 158, 255, 0.3);
            border-color: #4a9eff;
        }

        .keyframe-btn:active {
            background: rgba(74, 158, 255, 0.4);
        }

        .keyframe-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .keyframe-speed-control {
            margin-top: 10px;
        }

        .keyframe-speed-control label {
            font-size: 11px;
            color: #aaa;
            display: block;
            margin-bottom: 4px;
        }

        #keyframe-speed-slider {
            width: 100%;
            margin-top: 2px;
        }

        #keyframes-list:empty::before {
            content: "No keyframes yet";
            display: block;
            text-align: center;
            color: #555;
            font-size: 11px;
            padding: 15px 0;
        }

        /* Arrow Button Controls */
        .arrow-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .arrow-btn {
            background: rgba(74, 158, 255, 0.2);
            border: 2px solid rgba(74, 158, 255, 0.5);
            color: #4a9eff;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            font-weight: bold;
        }

        .arrow-btn:hover {
            background: rgba(74, 158, 255, 0.3);
            border-color: #4a9eff;
        }

        .arrow-btn:active {
            background: rgba(74, 158, 255, 0.5);
            transform: scale(0.95);
        }

        .arrow-btn:nth-child(1) {
            grid-column: 2;
        }

        .arrow-btn:nth-child(2) {
            grid-column: 1;
            grid-row: 2;
        }

        .arrow-btn:nth-child(3) {
            grid-column: 2;
            grid-row: 3;
        }

        .arrow-btn:nth-child(4) {
            grid-column: 3;
            grid-row: 2;
        }

        .arrow-btn:nth-child(5) {
            grid-column: 1;
            grid-row: 1;
        }

        .arrow-btn:nth-child(6) {
            grid-column: 3;
            grid-row: 3;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading 3D viewer...</p>
    </div>

    <div id="left-panels">
        <div id="ui-panel" class="left-panel">
        <h2>World of Embeddings</h2>
        <div class="info-group">
            <div class="info-label">Camera Position + Angle (Pitch, Yaw, Roll)</div>
            <div class="info-value" id="camera-pos">0, 0, 0</div>
            <div class="info-value" id="view-angle">0°, 0°, 0°</div>
        </div>
        <div class="info-group">
            <div class="info-label">Near Point</div>
            <div class="info-value" id="near-point">-</div>
        </div>
        <div class="info-group">
            <div class="info-label">Image Size: <span id="image-size-value">0.25</span></div>
            <input type="range" id="image-size-slider" min="-2" max="1" step="0.01" value="-0.602" style="width: 100%; margin-top: 5px;">
            <div style="font-size: 10px; color: #666; margin-top: 2px; display: flex; justify-content: space-between;">
                <span>0.01</span>
                <span>10</span>
            </div>
        </div>
        <div class="info-group">
            <div class="info-label">Nearest Images: <span id="nearest-count-value">50</span></div>
            <input type="range" id="nearest-count-slider" min="1" max="500" step="1" value="50" style="width: 100%; margin-top: 5px;">
            <div style="font-size: 10px; color: #666; margin-top: 2px; display: flex; justify-content: space-between;">
                <span>1</span>
                <span>All</span>
            </div>
        </div>
        </div>
        
        <!-- Keyframes Panel -->
        <div id="keyframes-panel" class="left-panel">
            <h3>Camera Keyframes</h3>
            <div class="control-section">
                <div id="keyframes-list"></div>
                <div class="keyframe-controls">
                    <button id="add-keyframe-btn" class="keyframe-btn">Add Keyframe</button>
                    <button id="play-keyframes-btn" class="keyframe-btn">Play</button>
                </div>
                <div class="keyframe-speed-control">
                    <label for="keyframe-speed-slider">Speed: <span id="keyframe-speed-value">1.0</span>x</label>
                    <input type="range" id="keyframe-speed-slider" min="0.1" max="3" step="0.1" value="1.0">
                </div>
            </div>
        </div>

        <div id="controls" class="left-panel">
            <h3>Controls</h3>
            <div class="arrow-buttons">
                <button class="arrow-btn" id="btn-up" title="Up (E)">↑</button>
                <button class="arrow-btn" id="btn-left" title="Left (A)">←</button>
                <button class="arrow-btn" id="btn-down" title="Down (Y)">↓</button>
                <button class="arrow-btn" id="btn-right" title="Right (D)">→</button>
                <button class="arrow-btn" id="btn-forward" title="Forward (W)">↖</button>
                <button class="arrow-btn" id="btn-back" title="Backward (S)">↘</button>
            </div>
        </div>
    </div>

    <!-- Right side orientation mini-views -->
    <div id="side-views">
        <div class="side-view">
            <div class="side-title">X–Y</div>
            <canvas id="view-xy" width="224" height="140"></canvas>
        </div>
        <div class="side-view">
            <div class="side-title">X–Z</div>
            <canvas id="view-xz" width="224" height="140"></canvas>
        </div>
        <div class="side-view">
            <div class="side-title">Y–Z</div>
            <canvas id="view-yz" width="224" height="140"></canvas>
        </div>
    </div>

    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="{{ url_for('static', filename='viewer.js') }}"></script>
</body>
</html>
